<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotaska - 画面モック（現行実装準拠）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "Segoe UI", "Meiryo", sans-serif;
      color: #333;
      background: #f5f5f5;
    }

    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 50px;
      min-width: 50px;
      background: #1c1c1c;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 0;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: #555;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .sb-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.4;
      cursor: pointer;
    }
    .sb-icon.active { opacity: 1; background: rgba(255, 255, 255, 0.08); }
    .sb-spacer { flex: 1; }

    .nav-panel {
      width: 240px;
      min-width: 240px;
      background: #2b2b2b;
      color: #ccc;
      border-right: 1px solid #333;
      overflow-y: auto;
      padding-top: 8px;
    }
    .nav-item {
      margin: 1px 10px;
      padding: 8px 14px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .nav-item.active { background: rgba(255, 255, 255, 0.1); }
    .nav-item .icon { width: 20px; text-align: center; }
    .nav-item .badge { margin-left: auto; color: #666; font-size: 12px; }
    .nav-item .list-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .list-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .divider {
      border-top: 1px solid #3a3a3a;
      margin: 12px 10px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #666;
      letter-spacing: 1px;
      padding: 16px 14px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-label .left {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-label .add-btn { color: #888; }
    .hint-text {
      margin: 4px 10px;
      padding: 8px 14px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.03);
      font-size: 12px;
      color: #555;
    }

    .main-pane {
      flex: 1;
      min-width: 320px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .main-header {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .view-title {
      font-size: 20px;
      font-weight: 600;
    }
    .header-actions {
      display: flex;
      gap: 12px;
      color: #777;
    }

    .quick-add {
      margin: 0 20px 16px;
      padding: 8px 12px;
      border-radius: 10px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #888;
    }
    .quick-add input {
      border: none;
      background: transparent;
      flex: 1;
      outline: none;
      color: #666;
      font-size: 14px;
    }
    .qa-actions { display: flex; gap: 10px; }

    .task-list {
      flex: 1;
      overflow-y: auto;
    }
    .section-header {
      padding: 6px 20px;
      font-size: 12px;
      font-weight: 600;
      color: #999;
    }
    .section-header.overdue { color: #e74c3c; }
    .section-header.today { color: #2980b9; }

    .task-row {
      height: 40px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .task-row.selected { background: rgba(66, 133, 244, 0.08); }
    .task-row--subtask { padding-left: 40px; }

    .expand-btn {
      width: 16px;
      border: none;
      background: transparent;
      color: #888;
      font-size: 12px;
    }
    .drag-handle { width: 12px; color: #bbb; font-size: 10px; }
    .task-row input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #3498db;
    }
    .task-title {
      flex: 1;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .progress-status-badge {
      font-size: 11px;
      border-radius: 10px;
      padding: 2px 8px;
      border: 1px solid;
      white-space: nowrap;
    }
    .progress-status-badge.not-started {
      background: #f2f3f5;
      color: #6c757d;
      border-color: #e1e5ea;
    }
    .progress-status-badge.in-progress {
      background: #eaf4fb;
      color: #2d78b7;
      border-color: #d5e9f7;
    }
    .priority-icon { font-size: 11px; font-weight: 700; }
    .priority-medium { color: #f39c12; }
    .priority-high { color: #e74c3c; }
    .task-due {
      font-size: 12px;
      color: #999;
      white-space: nowrap;
    }
    .task-due.overdue { color: #c0392b; font-weight: 600; }
    .task-separator {
      height: 1px;
      margin: 0 58px;
      background: #f0f0f0;
    }

    .detail-pane {
      width: 36%;
      min-width: 320px;
      background: #fafafa;
      border-left: 1px solid #eee;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* detail-header: チェック + タイトル + 右上アクション */
    .detail-header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }
    .detail-header .header-title {
      flex: 1;
      font-size: 16px;
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      min-width: 0;
    }
    .detail-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .icon-action-btn {
      border: 1px solid #d0d7e2;
      border-radius: 6px;
      background: #fff;
      color: #4b5b73;
      font-size: 13px;
      line-height: 1;
      width: 30px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-action-btn:hover {
      background: #f2f6fb;
      border-color: #b9c5d7;
    }
    .icon-action-btn.external {
      color: #2d6ea5;
      border-color: #c2d4e8;
      background: #f7fbff;
    }
    .icon-action-btn.external:hover {
      background: #eaf4ff;
      flex-shrink: 0;
    }

    /* detail-meta: メタ情報集約セクション */
    .detail-meta {
      padding: 10px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      background: #f7f9fb;
    }
    .meta-section-header {
      font-size: 11px;
      color: #999;
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #666;
    }
    .meta-item-label {
      color: #888;
      white-space: nowrap;
      min-width: 42px;
    }
    .meta-select,
    .meta-tag-select,
    .meta-tag-input {
      border: 1px solid #d0d7e2;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      background: #fff;
      color: #444;
    }
    .meta-select { min-width: 66px; }
    .meta-tag-select { min-width: 80px; font-size: 11px; padding: 2px 6px; }
    .meta-tag-input { flex: 1; min-width: 50px; font-size: 11px; padding: 2px 6px; }
    .meta-tag-add-btn {
      border: 1px solid #d0d7e2;
      border-radius: 6px;
      background: #f7f9ff;
      color: #2d78b7;
      font-size: 11px;
      padding: 2px 8px;
    }
    .meta-tag-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 4px;
      background: #e8ecf0;
      color: #555;
      padding: 2px 8px;
      font-size: 11px;
    }
    .tag-remove-btn {
      border: none;
      background: transparent;
      color: #999;
      cursor: pointer;
      font-size: 11px;
      padding: 0;
    }

    /* detail-body: メモ本文のみ */
    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
    }
    .body-section-header {
      font-size: 11px;
      color: #999;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      flex-shrink: 0;
    }
    .detail-content {
      width: 100%;
      flex: 1;
      min-height: 0;
      border: none;
      background: transparent;
      outline: none;
      resize: none;
      line-height: 1.55;
      font-size: 14px;
      color: #666;
      font-family: inherit;
    }

    /* detail-footer: IDのみ */
    .detail-footer {
      height: 32px;
      padding: 0 16px;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .d-task-id {
      font-size: 11px;
      color: #bbb;
      font-family: "Consolas", "Courier New", monospace;
      letter-spacing: 0.04em;
      user-select: text;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <div class="avatar">👤</div>
      <div class="sb-icon active" title="リスト">📋</div>
      <div class="sb-icon" title="カレンダー">📅</div>
      <div class="sb-icon" title="検索">🔍</div>
      <div class="sb-spacer"></div>
      <div class="sb-icon" title="設定">⚙️</div>
    </div>

    <div class="nav-panel">
      <div class="nav-item"><span class="icon">🗂️</span>すべて <span class="badge">12</span></div>
      <div class="nav-item active"><span class="icon">☀️</span>今日 <span class="badge">3</span></div>
      <div class="nav-item"><span class="icon">📅</span>明日 <span class="badge">2</span></div>
      <div class="nav-item"><span class="icon">📆</span>次の7日間 <span class="badge">6</span></div>

      <div class="divider"></div>
      <div class="section-label">
        <span class="left"><span>▼</span><span>リスト</span></span>
        <span class="add-btn">＋</span>
      </div>
      <div class="nav-item"><span class="icon">📂</span><span class="list-name">リストなし</span><span class="badge">3</span></div>
      <div class="nav-item"><span class="list-dot" style="background:#4772fa"></span><span class="list-name">業務タスク</span><span class="badge">4</span></div>
      <div class="nav-item"><span class="list-dot" style="background:#e67e22"></span><span class="list-name">開発タスク</span><span class="badge">5</span></div>
      <div class="nav-item"><span class="list-dot" style="background:#27ae60"></span><span class="list-name">個人メモ</span></div>

      <div class="divider"></div>
      <div class="section-label">
        <span class="left"><span>▼</span><span>タグ</span></span>
        <span class="add-btn">＋</span>
      </div>
      <div class="nav-item"><span class="icon">🏷️</span>#設計 <span class="badge">2</span></div>
      <div class="nav-item"><span class="icon">🏷️</span>#DB <span class="badge">1</span></div>

      <div class="divider"></div>
      <div class="nav-item"><span class="icon">✅</span>完了</div>
      <div class="nav-item"><span class="icon">🗑️</span>ゴミ箱</div>
    </div>

    <div class="main-pane">
      <div class="main-header">
        <div class="view-title">今日</div>
        <div class="header-actions">
          <span>⇅</span>
          <span>⋯</span>
        </div>
      </div>

      <div class="quick-add">
        <span>＋</span>
        <input type="text" value="" placeholder="タスクを追加（確定キーで保存）" />
        <div class="qa-actions"><span>📅</span><span>⚑</span><span>📋</span><span>#</span></div>
      </div>

      <div class="task-list">
        <div class="section-header overdue">⚠️ 遅延</div>
        <div class="task-row">
          <button class="expand-btn">▸</button>
          <span class="drag-handle">⠇</span>
          <input type="checkbox" />
          <span class="task-title">API仕様書レビュー</span>
          <span class="progress-status-badge not-started">未着</span>
          <span class="priority-icon priority-high">!!</span>
          <span class="task-due overdue">3/12</span>
        </div>
        <div class="task-separator"></div>

        <div class="section-header today">☀️ 今日</div>
        <div class="task-row selected">
          <button class="expand-btn">▾</button>
          <span class="drag-handle">⠇</span>
          <input type="checkbox" />
          <span class="task-title">DB設計書の作成</span>
          <span class="progress-status-badge in-progress">仕掛</span>
          <span class="priority-icon priority-medium">!</span>
          <span class="task-due">3/24</span>
        </div>
        <div class="task-row task-row--subtask">
          <span class="drag-handle">⠇</span>
          <input type="checkbox" />
          <span class="task-title">テーブル定義の見直し</span>
          <span class="progress-status-badge not-started">未着</span>
          <span class="task-due">期限未設定</span>
        </div>
      </div>
    </div>

    <div class="detail-pane">
      <!-- detail-header: チェック + タイトル + 右上アクション -->
      <div class="detail-header">
        <input type="checkbox" style="width:17px;height:17px;accent-color:#3498db;" />
        <input class="header-title" type="text" value="DB設計書の作成" />
        <div class="detail-actions">
          <button class="icon-action-btn" title="プレビュー切替">🔍</button>
          <button class="icon-action-btn external" title="新しいアプリで開く">↗</button>
        </div>
      </div>

      <!-- detail-meta: メタ情報集約 -->
      <div class="detail-meta">
        <div class="meta-section-header">▼ メタ情報</div>
        <!-- Row 1: 進捗 + 期限 + 優先度 -->
        <div class="meta-row">
          <div class="meta-item">
            <span class="meta-item-label">進捗:</span>
            <select class="meta-select">
              <option>未着</option>
              <option selected>仕掛</option>
              <option>完了</option>
            </select>
          </div>
          <div class="meta-item">
            <span class="meta-item-label">期限:</span>
            <span style="font-size:12px;color:#999;cursor:pointer;">3/24</span>
          </div>
          <div class="meta-item">
            <span class="meta-item-label">優先度:</span>
            <select class="meta-select" style="color:#f39c12;">
              <option>低</option>
              <option selected>中</option>
              <option>高</option>
            </select>
          </div>
        </div>
        <!-- Row 2: リスト + タグ選択 + タグ入力 -->
        <div class="meta-row">
          <select class="meta-select" style="min-width:90px;">
            <option>業務タスク</option>
            <option>開発タスク</option>
            <option>個人メモ</option>
          </select>
          <select class="meta-tag-select"><option>タグ選択...</option></select>
          <input class="meta-tag-input" type="text" value="" placeholder="新タグ" />
          <button class="meta-tag-add-btn">追加</button>
        </div>
        <!-- Row 3: タグチップス -->
        <div class="meta-tag-row">
          <span class="tag">#設計 <button class="tag-remove-btn">x</button></span>
          <span class="tag">#DB <button class="tag-remove-btn">x</button></span>
        </div>
      </div>

      <!-- detail-body: メモ本文のみ -->
      <div class="detail-body">
        <div class="body-section-header">▼ タスク詳細</div>
        <textarea class="detail-content">tasks, task_logs, lists の定義を作成する。

- カラム定義
- 制約定義
- 初期データ確認</textarea>
      </div>

      <!-- detail-footer: IDのみ -->
      <div class="detail-footer">
        <span class="d-task-id">ID: T-0028</span>
      </div>
    </div>
  </div>
</body>
</html>
